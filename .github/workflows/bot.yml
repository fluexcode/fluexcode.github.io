name: Kick.com 7/24 Bot

on:
  schedule:
    - cron: '*/5 * * * *'  # Her 5 dakikada bir
  workflow_dispatch:  # Manuel çalıştırma

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Paketleri Yükle
        run: |
          pip install requests websocket-client python-dotenv
          
      - name: Secret'ları Ayarla
        env:
          KICK_USERNAME: ${{ secrets.KICK_USERNAME }}
          KICK_PASSWORD: $${{ secrets.KICK_PASSWORD }}
          KICK_CHANNEL: ${{ secrets.KICK_CHANNEL }}
        run: |
          echo "KICK_USERNAME=$KICK_USERNAME" >> .env
          echo "KICK_PASSWORD=$KICK_PASSWORD" >> .env
          echo "KICK_CHANNEL=$KICK_CHANNEL" >> .env
          
      - name: Botu Çalıştır
        run: python bot/main.py
